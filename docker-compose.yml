services:
  fomenki-bot:
    image: lobanovsky/fomenki-bot:${TAG}
    container_name: fomenki-bot
    restart: always
    environment:
      TZ: Europe/Moscow
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      DB_NAME: ${DB_NAME}
      CHROMEDRIVER_PATH: ${CHROMEDRIVER_PATH}
      DEV_MODE: ${DEV_MODE}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    env_file:
      - .env
